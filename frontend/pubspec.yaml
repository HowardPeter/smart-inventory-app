name: frontend
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.3.4

dependencies:
  flutter:
    sdk: flutter

  # ----------------------------------------------------
  # State Management & Routing
  # ----------------------------------------------------
  get: ^4.7.3

  # ----------------------------------------------------
  # Network & API
  # ----------------------------------------------------
  connectivity_plus: ^7.0.0
  dio: ^5.9.2
  flutter_dotenv: ^6.0.0

  # ----------------------------------------------------
  # UI & Design
  # ----------------------------------------------------
  cupertino_icons: ^1.0.8
  fl_chart: ^1.2.0
  iconsax_flutter: ^1.0.1
  shimmer: ^3.0.0

  # ----------------------------------------------------
  # Utils & Helpers
  # ----------------------------------------------------
  app_settings: ^7.0.0
  change_app_package_name: ^1.5.0
  device_preview: ^1.3.1
  flutter_map: ^8.2.2
  flutter_secure_storage: ^10.0.0
  flutter_timezone: ^5.0.2
  get_storage: ^2.1.1
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  google_sign_in: ^7.2.0
  intl: ^0.20.2
  latlong2: ^0.9.1
  mobile_scanner: ^7.2.0
  open_mail_app_plus: ^0.0.2

  # ----------------------------------------------------
  # Supabase
  # ----------------------------------------------------
  supabase_flutter: ^2.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

# ----------------------------------------------------
# Phần cấu hình cốt lõi của Flutter
# ----------------------------------------------------
flutter:
  uses-material-design: true

  assets:
    - assets/logos/
    - assets/icons/
    - assets/images/auth/
    - assets/images/core/
    - assets/images/onboarding/
    - assets/mock_data/

  # Fonts phải nằm lùi vào 2 space bên trong flutter:
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Thin.ttf
          weight: 100
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

    - family: SuezOne
      fonts:
        - asset: assets/fonts/SuezOne-Regular.ttf
          weight: 400

# ----------------------------------------------------
# Cấu hình App Icon phải nằm NGOÀI CÙNG
# ----------------------------------------------------
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logos/app-icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logos/app-icon.png"
