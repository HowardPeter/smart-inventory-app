name: frontend
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.3.4

dependencies:
  flutter:
    sdk: flutter

  # ----------------------------------------------------
  # State Management & Routing
  # ----------------------------------------------------
  get: ^4.7.3

  # ----------------------------------------------------
  # Network & API
  # ----------------------------------------------------
  connectivity_plus: ^5.0.2
  dio: ^5.9.2

  # ----------------------------------------------------
  # UI & Design
  # ----------------------------------------------------
  cupertino_icons: ^1.0.8

  # ----------------------------------------------------
  # Utils & Helpers
  # ----------------------------------------------------
  app_settings: ^5.1.1
  change_app_package_name: ^1.5.0
  device_preview: ^1.1.0
  flutter_secure_storage: ^9.2.4
  get_storage: ^2.1.1
  google_sign_in: ^6.2.1
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

# ----------------------------------------------------
# Phần cấu hình cốt lõi của Flutter
# ----------------------------------------------------
flutter:
  uses-material-design: true

  assets:
    - assets/logos/
    - assets/images/auth/
    - assets/images/core/
    - assets/images/onboarding/

  # Fonts phải nằm lùi vào 2 space bên trong flutter:
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Thin.ttf
          weight: 100
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

    - family: SuezOne
      fonts:
        - asset: assets/fonts/SuezOne-Regular.ttf
          weight: 400

# ----------------------------------------------------
# Cấu hình App Icon phải nằm NGOÀI CÙNG
# ----------------------------------------------------
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logos/app_icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logos/app_icon.png"
