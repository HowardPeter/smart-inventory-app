name: 'Install & cache dependencies'
description: 'Install the dependencies via npm and cache them'

outputs:
  cache-hit:
    description: 'Whether setup-node restored dependency cache'
    value: ${{ steps.setup-node.outputs.cache-hit }}
runs:
  using: 'composite'
  steps:
    - name: Setup Node
      id: setup-node
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: backend/package-lock.json

    - name: Install dependencies
      run: npm ci
      shell: bash
      working-directory: backend