name: CI workflow for frontend

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  analyze:
    name: Static Code Analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.4"
          channel: "stable"
          cache: true 

      - name: Create dummy .env file
        run: |
          echo "API_BASE_URL=http://localhost:3000" > .env
          echo "SUPABASE_URL=http://localhost:54321" >> .env
          echo "SUPABASE_ANON_KEY=dummy_key" >> .env

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.4"
          channel: "stable"
          cache: true

      - name: Create dummy .env file
        run: |
          echo "API_BASE_URL=http://localhost:3000" > .env
          echo "SUPABASE_URL=http://localhost:54321" >> .env
          echo "SUPABASE_ANON_KEY=dummy_key" >> .env

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test
